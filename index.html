<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>基础课学习系统</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f5f5f2;
  font-family: -apple-system, 'Inter', 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 0;
}
.hero {
  text-align: center; margin-bottom: 48px;
}
.hero h1 {
  font-size: 28px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px;
}
.hero p {
  font-size: 14px; color: #888;
}
.cards {
  display: flex; gap: 20px;
}
.card {
  width: 220px;
  background: #fff;
  border: 1px solid #e0ddd6;
  border-radius: 12px;
  padding: 28px 24px;
  text-decoration: none;
  color: inherit;
  transition: box-shadow .15s, transform .15s;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,.05);
}
.card:hover {
  box-shadow: 0 8px 24px rgba(0,0,0,.1);
  transform: translateY(-2px);
}
.card-icon { font-size: 36px; }
.card-title { font-size: 15px; font-weight: 700; color: #1a1a1a; }
.card-desc  { font-size: 12px; color: #888; text-align: center; line-height: 1.5; }
.card-badge {
  font-size: 10px; font-weight: 700; padding: 3px 10px;
  border-radius: 10px; letter-spacing: .04em;
}
</style>
</head>
<body>
<div class="hero">
  <h1>📚 基础课学习系统</h1>
  <p>知识图谱 · 学习笔记 · 考试测验 · 进度追踪</p>
</div>
<div class="cards">
  <a class="card" href="graph.html">
    <div class="card-icon">🕸️</div>
    <div class="card-title">知识图谱</div>
    <div class="card-desc">浏览四门课程的知识结构，记录笔记，参加测验</div>
    <span class="card-badge" style="background:#e8f3fd;color:#0a6ed1">Graph + Quiz</span>
  </a>
  <a class="card" href="dashboard.html">
    <div class="card-icon">📊</div>
    <div class="card-title">学习 Dashboard</div>
    <div class="card-desc">查看每门课的学习进度、考试历史与平均分</div>
    <span class="card-badge" style="background:#e8f5e9;color:#2e7d32">Progress</span>
  </a>
</div>
</body>
</html>
