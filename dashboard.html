<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习 Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f5f5f2;
  font-family: -apple-system, 'Inter', 'Segoe UI', sans-serif;
  color: #1a1a1a;
  min-height: 100vh;
}
#topbar {
  position: fixed; top: 0; left: 0; right: 0; height: 48px;
  background: rgba(250,250,247,.95); border-bottom: 1px solid #e0ddd6;
  display: flex; align-items: center; gap: 12px; padding: 0 20px;
  backdrop-filter: blur(8px); z-index: 30;
}
#topbar-title { font-size: 13px; font-weight: 600; color: #3d3d3a; }
#home-btn {
  margin-left: auto;
  padding: 4px 12px; border: 1px solid #ddd; border-radius: 20px;
  cursor: pointer; font-size: 11px; color: #555; background: transparent;
  text-decoration: none; display: flex; align-items: center; gap: 4px;
}
#home-btn:hover { background: #eeecea; }

.main { padding: 72px 24px 40px; max-width: 900px; margin: 0 auto; }

.overview {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px;
}
.stat-card {
  background: #fff; border: 1px solid #e0ddd6; border-radius: 12px;
  padding: 20px 18px; display: flex; flex-direction: column; gap: 6px;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.stat-num { font-size: 28px; font-weight: 700; line-height: 1; }
.stat-label { font-size: 12px; color: #888; }

.section-title {
  font-size: 14px; font-weight: 700; color: #3d3d3a; margin-bottom: 14px;
  display: flex; align-items: center; gap: 6px;
}
.subjects { display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px; }
.subject-card {
  background: #fff; border: 1px solid #e0ddd6; border-radius: 12px;
  padding: 18px 20px; box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.subject-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
}
.subject-name { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.subject-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.subject-stats { display: flex; gap: 20px; }
.subject-stat { font-size: 11px; color: #888; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
.subject-stat strong { font-size: 15px; font-weight: 700; color: #1a1a1a; }

.progress-row { margin-bottom: 8px; }
.progress-label { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 4px; }
.progress-bar-bg { width: 100%; height: 6px; background: #f0ede8; border-radius: 3px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }

.concepts-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px;
  margin-top: 12px;
}
.concept-chip {
  padding: 6px 10px; border-radius: 8px; font-size: 11px;
  display: flex; align-items: center; justify-content: space-between; gap: 6px;
  border: 1px solid #e8e5df;
}
.concept-chip.has-note { border-color: #f59e0b; background: #fffbf0; }
.concept-chip.has-quiz { border-color: #7B68EE; background: #f5f3ff; }
.concept-chip.both { border-color: #E91E63; background: #fff5f8; }
.concept-chip.none { background: #f9f8f6; }
.chip-name { font-size: 11px; color: #444; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.chip-badges { display: flex; gap: 3px; flex-shrink: 0; }
.chip-badge {
  width: 16px; height: 16px; border-radius: 50%; font-size: 9px;
  display: flex; align-items: center; justify-content: center; font-weight: 700;
}
.badge-note { background: #f59e0b; color: #fff; }
.badge-quiz { background: #7B68EE; color: #fff; }

.history-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.history-table th {
  text-align: left; padding: 8px 12px; background: #f5f3ef;
  font-size: 11px; font-weight: 600; color: #666; border-bottom: 1px solid #e0ddd6;
}
.history-table th:first-child { border-radius: 8px 0 0 0; }
.history-table th:last-child { border-radius: 0 8px 0 0; }
.history-table td { padding: 8px 12px; border-bottom: 1px solid #f0ede8; color: #444; }
.history-table tr:last-child td { border-bottom: none; }
.score-badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 700;
}
.score-good { background: #e8f5e9; color: #2e7d32; }
.score-mid  { background: #fff8e1; color: #f57f17; }
.score-low  { background: #fce4ec; color: #c62828; }

.empty-state { text-align: center; padding: 40px 20px; color: #aaa; font-size: 13px; }
.empty-icon { font-size: 32px; margin-bottom: 8px; }
.table-wrap { background: #fff; border: 1px solid #e0ddd6; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
</style>
</head>
<body>

<div id="topbar">
  <span id="topbar-title">📊 学习 Dashboard</span>
  <a href="index.html" id="home-btn">🏠 首页</a>
</div>

<div class="main">
  <div class="overview" id="overview"></div>
  <div class="section-title">📚 各科目进度</div>
  <div class="subjects" id="subjects"></div>
  <div class="section-title">🕐 最近测验记录</div>
  <div class="table-wrap" id="history-wrap"></div>
</div>

<script>
const STORAGE_KEY = 'course_kg_data';

const SUBJECTS = [
  {
    id: 'ai-basics',
    name: '人工智能基础',
    color: '#7B68EE',
    concepts: [
      { id: 'concept-search', name: '搜索算法' },
      { id: 'concept-csp', name: '约束满足问题' },
      { id: 'concept-logic', name: '命题逻辑与一阶逻辑' },
      { id: 'concept-bayes', name: '贝叶斯网络' },
      { id: 'concept-mdp-ai', name: 'MDP 与规划' },
      { id: 'concept-ml-basics', name: '机器学习概览' },
    ]
  },
  {
    id: 'computer-vision',
    name: '计算机视觉',
    color: '#29b6f6',
    concepts: [
      { id: 'concept-image-proc', name: '图像处理基础' },
      { id: 'concept-feature-extract', name: '特征提取' },
      { id: 'concept-detection', name: '目标检测' },
      { id: 'concept-segmentation', name: '图像分割' },
      { id: 'concept-3d-vision', name: '三维视觉' },
      { id: 'concept-video', name: '视频理解' },
    ]
  },
  {
    id: 'ml-optimization',
    name: '机器学习中的优化方法',
    color: '#4caf50',
    concepts: [
      { id: 'concept-gd', name: '梯度下降族' },
      { id: 'concept-convex', name: '凸优化基础' },
      { id: 'concept-second-order', name: '二阶优化方法' },
      { id: 'concept-regularization', name: '正则化与泛化' },
      { id: 'concept-constrained', name: '约束优化' },
      { id: 'concept-stochastic-optim', name: '随机优化' },
    ]
  },
  {
    id: 'dl-rl',
    name: '深度学习和强化学习',
    color: '#E91E63',
    concepts: [
      { id: 'concept-cnn', name: '卷积神经网络' },
      { id: 'concept-rnn', name: '循环神经网络' },
      { id: 'concept-transformer', name: 'Transformer & Attention' },
      { id: 'concept-generative', name: '生成模型' },
      { id: 'concept-rl', name: '强化学习基础' },
      { id: 'concept-policy-grad', name: '策略梯度方法' },
      { id: 'concept-dl-practice', name: '深度学习实践' },
    ]
  }
];

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}

function pct(v, total) { return total > 0 ? Math.round(v / total * 100) : 0; }

function scoreClass(score, total) {
  const p = pct(score, total);
  if (p >= 75) return 'score-good';
  if (p >= 50) return 'score-mid';
  return 'score-low';
}

function render() {
  const data = loadData();
  let totalConcepts = 0, totalNotes = 0, totalQuizzes = 0, totalAttempts = 0;
  const allHistory = [];

  SUBJECTS.forEach(subj => {
    subj.concepts.forEach(c => {
      totalConcepts++;
      const nd = data[c.id] || {};
      if (nd.note && nd.note.trim()) totalNotes++;
      const hist = nd.quizHistory || [];
      if (hist.length > 0) totalQuizzes++;
      totalAttempts += hist.length;
      hist.forEach(h => allHistory.push({ ...h, conceptName: c.name, subjectName: subj.name, subjectColor: subj.color }));
    });
  });

  document.getElementById('overview').innerHTML = `
    <div class="stat-card"><div class="stat-num" style="color:#7B68EE">${totalConcepts}</div><div class="stat-label">总知识点</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#f59e0b">${totalNotes}</div><div class="stat-label">已记笔记</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#E91E63">${totalQuizzes}</div><div class="stat-label">已测验知识点</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#4caf50">${totalAttempts}</div><div class="stat-label">累计测验次数</div></div>
  `;

  const subjHtml = SUBJECTS.map(subj => {
    let noteCount = 0, quizCount = 0, totalScore = 0, totalPossible = 0;
    subj.concepts.forEach(c => {
      const nd = data[c.id] || {};
      if (nd.note && nd.note.trim()) noteCount++;
      const hist = nd.quizHistory || [];
      if (hist.length > 0) quizCount++;
      hist.forEach(h => { totalScore += (h.score || 0); totalPossible += (h.total || 4); });
    });
    const notePct = pct(noteCount, subj.concepts.length);
    const quizPct = pct(quizCount, subj.concepts.length);
    const avgScore = totalPossible > 0 ? Math.round(totalScore / totalPossible * 100) : null;
    const conceptChips = subj.concepts.map(c => {
      const nd = data[c.id] || {};
      const hasNote = !!(nd.note && nd.note.trim());
      const hasQuiz = !!(nd.quizHistory && nd.quizHistory.length > 0);
      const cls = hasNote && hasQuiz ? 'both' : hasNote ? 'has-note' : hasQuiz ? 'has-quiz' : 'none';
      return `<div class="concept-chip ${cls}"><span class="chip-name" title="${c.name}">${c.name}</span><span class="chip-badges">${hasNote ? '<span class="chip-badge badge-note" title="有笔记">N</span>' : ''}${hasQuiz ? '<span class="chip-badge badge-quiz" title="已测验">Q</span>' : ''}</span></div>`;
    }).join('');
    return `<div class="subject-card"><div class="subject-header"><div class="subject-name"><span class="subject-dot" style="background:${subj.color}"></span>${subj.name}</div><div class="subject-stats"><div class="subject-stat"><strong>${noteCount}/${subj.concepts.length}</strong><span>笔记</span></div><div class="subject-stat"><strong>${quizCount}/${subj.concepts.length}</strong><span>测验</span></div><div class="subject-stat"><strong>${avgScore !== null ? avgScore + '%' : '--'}</strong><span>平均分</span></div></div></div><div class="progress-row"><div class="progress-label"><span>笔记覆盖</span><span>${notePct}%</span></div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${notePct}%;background:#f59e0b"></div></div></div><div class="progress-row"><div class="progress-label"><span>测验覆盖</span><span>${quizPct}%</span></div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${quizPct}%;background:${subj.color}"></div></div></div><div class="concepts-grid">${conceptChips}</div></div>`;
  }).join('');
  document.getElementById('subjects').innerHTML = subjHtml;

  allHistory.sort((a, b) => new Date(b.date) - new Date(a.date));
  const recent = allHistory.slice(0, 30);
  const histWrap = document.getElementById('history-wrap');
  if (recent.length === 0) {
    histWrap.innerHTML = `<div class="empty-state"><div class="empty-icon">📝</div>暂无测验记录，去知识图谱开始第一次测验吧！</div>`;
  } else {
    histWrap.innerHTML = `<table class="history-table"><thead><tr><th>日期</th><th>知识点</th><th>科目</th><th>得分</th></tr></thead><tbody>${recent.map(h => `<tr><td>${h.date || '--'}</td><td>${h.conceptName}</td><td><span style="display:inline-flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:${h.subjectColor};display:inline-block"></span>${h.subjectName}</span></td><td><span class="score-badge ${scoreClass(h.score, h.total)}">${h.score}/${h.total} (${pct(h.score, h.total)}%)</span></td></tr>`).join('')}</tbody></table>`;
  }
}

render();
</script>
</body>
</html>
