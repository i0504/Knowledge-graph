<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识图谱 — 黄涵钰</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; background:#0a0c14; color:#e0e0e0; overflow:hidden; height:100vh; display:flex; }

/* ── 图谱区 ── */
#graph-area { flex:1; position:relative; }
svg { width:100%; height:100%; }

/* 边 */
.link { stroke:#252836; stroke-opacity:0.6; stroke-width:1.2; }
.link.strong  { stroke-width:2; stroke-opacity:0.75; }
.link.highlighted { stroke:#8899ff; stroke-opacity:1; stroke-width:2.5; }

/* 节点圆 */
.node circle {
  stroke:#0a0c14; stroke-width:2;
  cursor:pointer; transition: r 0.15s, filter 0.15s;
  filter: brightness(0.65) saturate(0.7);
}
.node circle.mastered { filter: brightness(1.15) saturate(1.2) drop-shadow(0 0 7px currentColor); }
.node circle.learning { filter: brightness(0.88) saturate(1); }
.node circle.dimmed   { filter: brightness(0.2) saturate(0.2); opacity:0.4; }
.node text {
  font-size:10.5px; fill:#b8bcd0; pointer-events:none;
  text-anchor:middle; dominant-baseline:central; user-select:none;
}
.node.anchor text { font-size:11.5px; fill:#d8dce8; font-weight:600; }
.node.selected circle { stroke:#ffffff; stroke-width:2.5; }
.node.learning circle { stroke:#ffe066; stroke-width:2; }

/* ── 7 子分类颜色 ──
   course系: algo=#4a90e0蓝, sys=#7c6fe0紫, ai=#5bbfdf青蓝
   coding系: dev=#43c87a绿, exp=#35b5a0青
   academic系: survey=#e0a83a橙, output=#e06060红粉
*/
.cat-algo     circle { fill:#4a90e0; }
.cat-sys      circle { fill:#7c6fe0; }
.cat-ai       circle { fill:#5bbfdf; }
.cat-dev      circle { fill:#43c87a; }
.cat-exp      circle { fill:#35b5a0; }
.cat-survey   circle { fill:#e0a83a; }
.cat-output   circle { fill:#d9607a; }

/* mastered 亮色 */
.cat-algo.mastered    circle { fill:#6aaaf5; }
.cat-sys.mastered     circle { fill:#a090f8; }
.cat-ai.mastered      circle { fill:#7ad8f0; }
.cat-dev.mastered     circle { fill:#65df96; }
.cat-exp.mastered     circle { fill:#55d0bc; }
.cat-survey.mastered  circle { fill:#f5c05a; }
.cat-output.mastered  circle { fill:#f07898; }

/* ── 右侧详情面板 ── */
#detail-panel {
  width:290px; height:100vh; background:#121520; border-left:1px solid #1e2235;
  display:flex; flex-direction:column; overflow:hidden;
  transition: transform 0.25s;
}
#detail-panel.hidden { transform: translateX(290px); position:absolute; right:0; }
#detail-header {
  padding:16px 14px 10px; border-bottom:1px solid #1e2235;
}
#detail-title { font-size:16px; font-weight:700; line-height:1.4; margin-bottom:5px; }
#detail-cat-badge {
  display:inline-block; font-size:10px; padding:2px 9px; border-radius:10px;
  background:#1e2235; color:#8899aa; letter-spacing:0.5px;
}
#detail-body { flex:1; overflow-y:auto; padding:12px 14px; }
#detail-desc { font-size:12.5px; color:#909ab8; line-height:1.75; margin-bottom:14px; }
#detail-links h4 { font-size:10px; color:#444; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:7px; }
#detail-links-list { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:16px; }
.link-chip {
  font-size:11px; padding:3px 10px; border-radius:11px;
  background:#1a1e30; border:1px solid #252836; color:#8899bb; cursor:pointer;
  transition: all 0.15s;
}
.link-chip:hover { background:#252c44; color:#ccd; border-color:#4455aa; }
#detail-note-label { font-size:10px; color:#444; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:6px; }
#detail-note {
  width:100%; min-height:90px; background:#1a1e30; border:1px solid #252836;
  border-radius:6px; color:#bbc; font-size:12.5px; padding:8px 10px;
  resize:vertical; font-family:inherit; line-height:1.65;
}
#detail-note:focus { outline:none; border-color:#4a5a9e; }
#detail-footer { padding:10px 14px; border-top:1px solid #1e2235; }
.status-btns { display:flex; gap:5px; }
.status-btn {
  flex:1; padding:7px 0; border-radius:6px; font-size:11.5px; font-weight:500;
  border:1px solid #252836; background:#1a1e30; color:#666; cursor:pointer;
  transition: all 0.15s;
}
.status-btn:hover { border-color:#4a5a9e; color:#bbc; }
.status-btn.active.s-todo     { color:#555; background:#16192a; }
.status-btn.active.s-learning { color:#ffe066; background:#231f00; border-color:#ffe066; }
.status-btn.active.s-mastered { color:#43c87a; background:#0a1a10; border-color:#43c87a; }

/* ── 右上角看板 ── */
#dashboard {
  position:absolute; top:14px; right:305px; width:228px;
  background:#12152088; backdrop-filter:blur(8px);
  border:1px solid #1e2235; border-radius:10px;
  padding:13px; z-index:10;
  transition: right 0.25s;
}
#dashboard.panel-hidden { right:14px; }
#dash-title { font-size:10px; color:#44475a; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:9px; }
#dash-total-label { font-size:12.5px; color:#bbc; margin-bottom:5px; }
.progress-bar-wrap { background:#1a1e30; border-radius:4px; height:5px; margin-bottom:11px; overflow:hidden; }
.progress-bar-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,#43c87a,#5bbfdf); transition: width 0.4s; }
.cat-group-label { font-size:9.5px; color:#333; text-transform:uppercase; letter-spacing:1px; margin:8px 0 4px; padding-top:6px; border-top:1px solid #1a1e30; }
.cat-progress { margin-bottom:6px; }
.cat-progress-label { font-size:10.5px; color:#666; margin-bottom:2px; display:flex; justify-content:space-between; }
.cat-progress-label span { color:#444; }
.cat-bar-wrap { background:#1a1e30; border-radius:3px; height:3px; overflow:hidden; }
.cat-bar-fill { height:100%; border-radius:3px; transition: width 0.4s; }
.cat-bar-algo    { background:#4a90e0; }
.cat-bar-sys     { background:#7c6fe0; }
.cat-bar-ai      { background:#5bbfdf; }
.cat-bar-dev     { background:#43c87a; }
.cat-bar-exp     { background:#35b5a0; }
.cat-bar-survey  { background:#e0a83a; }
.cat-bar-output  { background:#d9607a; }
#btn-screenshot {
  width:100%; margin-top:9px; padding:6px 0; border-radius:6px;
  background:#1a1e30; border:1px solid #252836; color:#7788aa;
  font-size:11px; cursor:pointer; transition: all 0.15s;
}
#btn-screenshot:hover { background:#222840; color:#aabbcc; border-color:#4455aa; }

/* ── 左上角标题 ── */
#header { position:absolute; top:14px; left:14px; z-index:10; }
#header h1 { font-size:17px; font-weight:700; color:#dde; letter-spacing:0.5px; }
#header p  { font-size:10.5px; color:#44475a; margin-top:3px; }

/* ── 图例 ── */
#legend {
  position:absolute; bottom:14px; left:14px; z-index:10;
  display:flex; flex-wrap:wrap; gap:10px 16px; max-width:700px; align-items:center;
}
.legend-group { display:flex; align-items:center; gap:10px; }
.legend-sep { width:1px; height:14px; background:#1e2235; }
.legend-item { display:flex; align-items:center; gap:4px; font-size:10px; color:#555; }
.legend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

/* ── 搜索框 ── */
#search-wrap { position:absolute; top:14px; left:50%; transform:translateX(-50%); z-index:10; }
#search {
  background:#12152088; backdrop-filter:blur(8px);
  border:1px solid #1e2235; border-radius:18px;
  color:#ccc; font-size:12px; padding:6px 15px; width:190px;
  outline:none; transition: border-color 0.15s, width 0.2s;
}
#search:focus { border-color:#4a5a9e; width:250px; }
#search::placeholder { color:#333; }

/* ── 右键菜单 ── */
#ctx-menu {
  position:fixed; background:#1a1e30; border:1px solid #252836; border-radius:8px;
  padding:5px 0; z-index:999; display:none; min-width:140px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.6);
}
.ctx-item { padding:8px 15px; font-size:12.5px; cursor:pointer; color:#bbc; }
.ctx-item:hover { background:#252c44; }
.ctx-item .dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:8px; }

/* 滚动条 */
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:#0a0c14; }
::-webkit-scrollbar-thumb { background:#252836; border-radius:2px; }
</style>
</head>
<body>

<div id="graph-area">
  <svg id="graph"></svg>

  <div id="header">
    <a href="index.html" style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#44475a;text-decoration:none;margin-bottom:6px;padding:3px 10px;background:#12152088;border:1px solid #1e2235;border-radius:12px;" onmouseover="this.style.color='#9ab'" onmouseout="this.style.color='#44475a'">← 返回看板</a>
    <h1>知识图谱</h1>
    <p>点击节点展开 · 双击切换状态 · 右键更多</p>
  </div>

  <div id="search-wrap">
    <input id="search" type="text" placeholder="🔍 搜索节点…">
  </div>

  <div id="dashboard">
    <div id="dash-title">学习进度</div>
    <div id="dash-total-label">加载中…</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="total-bar" style="width:0%"></div></div>

    <div class="cat-group-label">📚 专业课基础</div>
    <div class="cat-progress">
      <div class="cat-progress-label">算法与数据结构 <span id="pct-algo">0%</span></div>
      <div class="cat-bar-wrap"><div class="cat-bar-fill cat-bar-algo" id="bar-algo" style="width:0%"></div></div>
    </div>
    <div class="cat-progress">
      <div class="cat-progress-label">系统与网络 <span id="pct-sys">0%</span></div>
      <div class="cat-bar-wrap"><div class="cat-bar-fill cat-bar-sys" id="bar-sys" style="width:0%"></div></div>
    </div>
    <div class="cat-progress">
      <div class="cat-progress-label">AI 基础 <span id="pct-ai">0%</span></div>
      <div class="cat-bar-wrap"><div class="cat-bar-fill cat-bar-ai" id="bar-ai" style="width:0%"></div></div>
    </div>

    <div class="cat-group-label">💻 编程与实验</div>
    <div class="cat-progress">
      <div class="cat-progress-label">开发工具链 <span id="pct-dev">0%</span></div>
      <div class="cat-bar-wrap"><div class="cat-bar-fill cat-bar-dev" id="bar-dev" style="width:0%"></div></div>
    </div>
    <div class="cat-progress">
      <div class="cat-progress-label">实验工程 <span id="pct-exp">0%</span></div>
      <div class="cat-bar-wrap"><div class="cat-bar-fill cat-bar-exp" id="bar-exp" style="width:0%"></div></div>
    </div>

    <div class="cat-group-label">🎓 学术素养</div>
    <div class="cat-progress">
      <div class="cat-progress-label">文献与调研 <span id="pct-survey">0%</span></div>
      <div class="cat-bar-wrap"><div class="cat-bar-fill cat-bar-survey" id="bar-survey" style="width:0%"></div></div>
    </div>
    <div class="cat-progress">
      <div class="cat-progress-label">输出与表达 <span id="pct-output">0%</span></div>
      <div class="cat-bar-wrap"><div class="cat-bar-fill cat-bar-output" id="bar-output" style="width:0%"></div></div>
    </div>

    <button id="btn-screenshot">📸 生成进度截图</button>
  </div>

  <div id="legend">
    <div class="legend-group">
      <div class="legend-item"><div class="legend-dot" style="background:#4a90e0"></div>算法与数据结构</div>
      <div class="legend-item"><div class="legend-dot" style="background:#7c6fe0"></div>系统与网络</div>
      <div class="legend-item"><div class="legend-dot" style="background:#5bbfdf"></div>AI基础</div>
    </div>
    <div class="legend-sep"></div>
    <div class="legend-group">
      <div class="legend-item"><div class="legend-dot" style="background:#43c87a"></div>开发工具链</div>
      <div class="legend-item"><div class="legend-dot" style="background:#35b5a0"></div>实验工程</div>
    </div>
    <div class="legend-sep"></div>
    <div class="legend-group">
      <div class="legend-item"><div class="legend-dot" style="background:#e0a83a"></div>文献与调研</div>
      <div class="legend-item"><div class="legend-dot" style="background:#d9607a"></div>输出与表达</div>
    </div>
    <div class="legend-sep"></div>
    <div class="legend-group">
      <div class="legend-item"><div class="legend-dot" style="background:#444;border:1px solid #ffe066"></div>学习中</div>
      <div class="legend-item"><div class="legend-dot" style="background:#43c87a;box-shadow:0 0 5px #43c87a"></div>已掌握</div>
    </div>
  </div>
</div>

<!-- 右侧详情面板 -->
<div id="detail-panel" class="hidden">
  <div id="detail-header">
    <div id="detail-title">—</div>
    <div id="detail-cat-badge">—</div>
  </div>
  <div id="detail-body">
    <div id="detail-desc"></div>
    <div id="detail-links">
      <h4>关联节点</h4>
      <div id="detail-links-list"></div>
    </div>
    <div id="detail-note-label">我的笔记</div>
    <textarea id="detail-note" placeholder="记录你的理解、疑问或复习要点…"></textarea>
  </div>
  <div id="detail-footer">
    <div class="status-btns">
      <button class="status-btn s-todo"     data-s="todo">⚪ 未学</button>
      <button class="status-btn s-learning" data-s="learning">🟡 学习中</button>
      <button class="status-btn s-mastered" data-s="mastered">🟢 已掌握</button>
    </div>
  </div>
</div>

<!-- 右键菜单 -->
<div id="ctx-menu">
  <div class="ctx-item" data-s="todo"><span class="dot" style="background:#333;border:1px solid #555"></span>标记未学</div>
  <div class="ctx-item" data-s="learning"><span class="dot" style="background:#ffe066"></span>标记学习中</div>
  <div class="ctx-item" data-s="mastered"><span class="dot" style="background:#43c87a"></span>标记已掌握</div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// 数据：7 子分类，52 节点，80+ 条边
// cat: algo / sys / ai / dev / exp / survey / output
// anchor:true 表示锚点节点（稍大）
// ═══════════════════════════════════════════════════════
const NODES = [

  // ━━━━━━━━━━━━━━━━━━━━━━
  // 算法与数据结构 (algo) 蓝
  // ━━━━━━━━━━━━━━━━━━━━━━
  { id:"ds",        label:"数据结构",     cat:"algo", anchor:true,
    desc:"数组、链表、栈/队列、树、图、堆、哈希表。掌握每种结构的适用场景和增删查的时间复杂度，是刷题和面试的基础。" },
  { id:"sort",      label:"排序算法",     cat:"algo",
    desc:"快排O(nlogn)平均/O(n²)最坏；归并O(nlogn)稳定；堆排O(nlogn)原地不稳定；计数/基数O(n+k)非比较。手写快排是高频考点。" },
  { id:"tree",      label:"二叉树",       cat:"algo",
    desc:"前/中/后序遍历（递归+迭代模板）、层序BFS、BST（查找/插入/删除）、AVL/红黑树平衡条件。DFS递归框架要烂熟于心。" },
  { id:"graph_ds",  label:"图算法",       cat:"algo",
    desc:"BFS/DFS遍历、Dijkstra最短路（堆优化O((V+E)logV)）、Floyd全源O(V³)、Kruskal/Prim最小生成树、拓扑排序（Kahn算法）、并查集。" },
  { id:"dp",        label:"动态规划",     cat:"algo",
    desc:"状态定义→转移方程→初始化→遍历顺序。经典：背包、LCS、LIS、编辑距离、矩阵链乘。优化：滚动数组、单调队列、斜率优化。" },
  { id:"complexity",label:"复杂度分析",   cat:"algo",
    desc:"时间/空间大O记号，摊还分析，Master定理（分治递归分析）。能快速判断算法效率是写好代码的基本功。" },
  { id:"hash",      label:"哈希表",       cat:"algo",
    desc:"哈希函数设计、冲突解决（链地址/开放寻址）、装载因子、再哈希。Python dict / C++ unordered_map的底层原理。" },

  // ━━━━━━━━━━━━━━━━━━━━━━
  // 系统与网络 (sys) 紫
  // ━━━━━━━━━━━━━━━━━━━━━━
  { id:"os",        label:"操作系统",     cat:"sys", anchor:true,
    desc:"进程/线程管理、调度算法、内存管理（虚拟内存/分页/TLB）、文件系统、I/O模型、死锁（4条件+银行家算法）。" },
  { id:"process",   label:"进程与线程",   cat:"sys",
    desc:"进程=资源分配单位，线程=CPU调度单位。PCB结构、五状态转换、进程通信（管道/信号量/共享内存/消息队列）、协程概念。" },
  { id:"schedule",  label:"调度算法",     cat:"sys",
    desc:"FCFS/SJF/RR时间片轮转/优先级/多级反馈队列。评价指标：CPU利用率、吞吐量、周转时间、等待时间、响应时间。" },
  { id:"memory",    label:"内存管理",     cat:"sys",
    desc:"虚拟地址空间、分页（页表/多级页表）、TLB、缺页中断、页面置换（FIFO/LRU/Clock）、内存碎片（内/外碎片）。" },
  { id:"network",   label:"计算机网络",   cat:"sys", anchor:true,
    desc:"OSI七层/TCP-IP四层模型，各层协议职责，子网划分/CIDR，路由协议（RIP/OSPF/BGP），HTTP/HTTPS/DNS/ARP/ICMP。" },
  { id:"tcpip",     label:"TCP/IP",       cat:"sys",
    desc:"三次握手（SYN→SYN-ACK→ACK）、四次挥手、TIME_WAIT=2MSL原因、拥塞控制（慢启动/拥塞避免/快重传/快恢复）、滑动窗口。" },
  { id:"http",      label:"HTTP/HTTPS",   cat:"sys",
    desc:"HTTP无状态、请求方法(GET/POST等)、常用状态码、Cookie/Session、HTTP2多路复用。HTTPS=TLS+HTTP，握手流程，证书链验证。" },
  { id:"ca",        label:"计算机组成",   cat:"sys", anchor:true,
    desc:"指令集体系结构（CISC/RISC）、CPU组成（ALU/寄存器/控制器）、总线、Cache层次结构（L1/L2/L3）、I/O接口与DMA。" },
  { id:"cache",     label:"Cache原理",    cat:"sys",
    desc:"时间/空间局部性原理、Cache映射（直接/全相联/组相联）、替换策略（LRU/随机）、写策略（写直达/写回/写分配）。" },
  { id:"pipeline",  label:"流水线",       cat:"sys",
    desc:"5级流水线（IF/ID/EX/MEM/WB）、吞吐率与加速比、流水线冒险（结构/数据/控制）、数据前递、分支预测（静态/动态BTB）。" },

  // ━━━━━━━━━━━━━━━━━━━━━━
  // AI 基础 (ai) 青蓝
  // ━━━━━━━━━━━━━━━━━━━━━━
  { id:"ml_basic",  label:"机器学习",     cat:"ai", anchor:true,
    desc:"监督/无监督/强化学习范式，损失函数，梯度下降（SGD/Momentum/Adam），正则化（L1/L2/Dropout），偏差-方差分解，交叉验证。" },
  { id:"dl_basic",  label:"深度学习",     cat:"ai", anchor:true,
    desc:"BP反向传播（链式法则），激活函数（ReLU/GELU/Sigmoid/Tanh），BatchNorm/LayerNorm，优化器（Adam/AdamW），学习率调度。" },

// 状态管理 (localStorage)  — 与 index.html 共享同一个 key
// ═══════════════════════════════════════════════════════
const STORAGE_KEY = 'baoyuan_status';
const NOTE_KEY    = 'baoyuan_notes';
function loadStatus() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}; } catch{return {};} }
function saveStatus(o) { localStorage.setItem(STORAGE_KEY, JSON.stringify(o)); }
function loadNotes()  { try { return JSON.parse(localStorage.getItem(NOTE_KEY))||{}; }   catch{return {};} }
function saveNotes(o)  { localStorage.setItem(NOTE_KEY,   JSON.stringify(o)); }

let statusMap = loadStatus();
let notesMap  = loadNotes();
function getStatus(id) { return statusMap[id] || 'todo'; }
function setStatus(id, s) { statusMap[id] = s; saveStatus(statusMap); }

// ═══════════════════════════════════════════════════════
// D3 图谱
// ═══════════════════════════════════════════════════════
const nodes = NODES.map(d => ({...d}));
const links = EDGES.map(d => ({ source:d.s, target:d.t, w:d.w||1 }));

// 邻接表
const adjSet = {};
nodes.forEach(n => adjSet[n.id] = new Set());
EDGES.forEach(e => { adjSet[e.s].add(e.t); adjSet[e.t].add(e.s); });

const svg   = d3.select('#graph');
const width  = () => parseInt(svg.style('width'));
const height = () => parseInt(svg.style('height'));
const g = svg.append('g');

svg.call(d3.zoom().scaleExtent([0.15, 4]).on('zoom', e => g.attr('transform', e.transform)));

// 力模拟 — anchor 节点互相排斥更多
const sim = d3.forceSimulation(nodes)
  .force('link',    d3.forceLink(links).id(d=>d.id).distance(d => d.w===2 ? 80 : 110).strength(d => d.w===2 ? 0.5 : 0.25))
  .force('charge',  d3.forceManyBody().strength(d => d.anchor ? -320 : -180))
  .force('center',  d3.forceCenter(0,0))
  .force('collide', d3.forceCollide(d => d.anchor ? 36 : 26));

function recenter() {
  sim.force('center', d3.forceCenter(width()/2, height()/2));
  sim.alpha(0.15).restart();
}
window.addEventListener('resize', recenter);
setTimeout(recenter, 80);

// 边
const linkSel = g.append('g')
  .selectAll('line').data(links).join('line')
  .attr('class', d => d.w === 2 ? 'link strong' : 'link');

// 节点
const nodeSel = g.append('g')
  .selectAll('g').data(nodes).join('g')
  .attr('class', d => `node cat-${d.cat}${d.anchor ? ' anchor' : ''}`)
  .call(d3.drag()
    .on('start', (e,d) => { if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on('end',   (e,d) => { if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
  );

nodeSel.append('circle').attr('r', d => d.anchor ? 20 : 14);
nodeSel.append('text').text(d => d.label).attr('dy', d => (d.anchor ? 20 : 14) + 14);

sim.on('tick', () => {
  linkSel
    .attr('x1', d=>d.source.x).attr('y1', d=>d.source.y)
    .attr('x2', d=>d.target.x).attr('y2', d=>d.target.y);
  nodeSel.attr('transform', d=>`translate(${d.x},${d.y})`);
});

// ═══════════════════════════════════════════════════════
// 状态渲染
// ═══════════════════════════════════════════════════════
function applyStatus() {
  nodeSel.each(function(d) {
    const s = getStatus(d.id);
    const el = d3.select(this);
    el.classed('mastered', s==='mastered');
    el.classed('learning', s==='learning');
    el.select('circle')
      .classed('mastered', s==='mastered')
      .classed('learning', s==='learning');
  });
  updateDashboard();
}

function updateDashboard() {
  const total    = nodes.length;
  const mastered = nodes.filter(n => getStatus(n.id)==='mastered').length;
  document.getElementById('dash-total-label').textContent = `已掌握 ${mastered} / ${total} 个知识点`;
  document.getElementById('total-bar').style.width = (mastered/total*100).toFixed(1)+'%';

  ['algo','sys','ai','dev','exp','survey','output'].forEach(cat => {
    const grp = nodes.filter(n=>n.cat===cat);
    const m   = grp.filter(n=>getStatus(n.id)==='mastered').length;
    const pct = grp.length ? (m/grp.length*100).toFixed(0) : 0;
    document.getElementById(`pct-${cat}`).textContent = pct+'%';
    document.getElementById(`bar-${cat}`).style.width  = pct+'%';
  });
}

applyStatus();

// ═══════════════════════════════════════════════════════
// 选中 & 详情面板
// ═══════════════════════════════════════════════════════
let selectedId = null;

function selectNode(id) {
  selectedId = id;
  const d = nodes.find(n=>n.id===id);
  if (!d) return;

  const neighbors = adjSet[id];
  nodeSel.classed('dimmed', n => n.id!==id && !neighbors.has(n.id));
  nodeSel.classed('selected', n => n.id===id);
  linkSel.classed('highlighted', l => l.source.id===id || l.target.id===id);

  const panel = document.getElementById('detail-panel');
  panel.classList.remove('hidden');
  document.getElementById('dashboard').classList.remove('panel-hidden');

  document.getElementById('detail-title').textContent = d.label;
  document.getElementById('detail-cat-badge').textContent = CAT_META[d.cat]?.label || d.cat;
  document.getElementById('detail-desc').textContent = d.desc || '';

  const list = document.getElementById('detail-links-list');
  list.innerHTML = '';
  [...neighbors].sort().forEach(nid => {
    const nd = nodes.find(x=>x.id===nid);
    if (!nd) return;
    const chip = document.createElement('div');
    chip.className = 'link-chip';
    chip.textContent = nd.label;
    chip.onclick = () => selectNode(nid);
    list.appendChild(chip);
  });

  document.getElementById('detail-note').value = notesMap[id] || '';
  const s = getStatus(id);
  document.querySelectorAll('.status-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.s===s));
}

function clearSelection() {
  selectedId = null;
  nodeSel.classed('dimmed', false).classed('selected', false);
  linkSel.classed('highlighted', false);
  document.getElementById('detail-panel').classList.add('hidden');
  document.getElementById('dashboard').classList.add('panel-hidden');
}

nodeSel.on('click', (e,d) => {
  e.stopPropagation(); hideCtxMenu();
  if (selectedId===d.id) clearSelection(); else selectNode(d.id);
});

nodeSel.on('dblclick', (e,d) => {
  e.stopPropagation();
  const cycle = { todo:'learning', learning:'mastered', mastered:'todo' };
  setStatus(d.id, cycle[getStatus(d.id)]);
  applyStatus();
  if (selectedId===d.id) selectNode(d.id);
});

svg.on('click', () => { hideCtxMenu(); clearSelection(); });

document.querySelectorAll('.status-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (!selectedId) return;
    setStatus(selectedId, btn.dataset.s);
    applyStatus();
    selectNode(selectedId);
  });
});

document.getElementById('detail-note').addEventListener('input', e => {
  if (!selectedId) return;
  notesMap[selectedId] = e.target.value;
  saveNotes(notesMap);
});

// ═══════════════════════════════════════════════════════
// 右键菜单
// ═══════════════════════════════════════════════════════
const ctxMenu = document.getElementById('ctx-menu');
let ctxTargetId = null;

nodeSel.on('contextmenu', (e,d) => {
  e.preventDefault(); e.stopPropagation();
  ctxTargetId = d.id;
  ctxMenu.style.display = 'block';
  ctxMenu.style.left = e.clientX+'px';
  ctxMenu.style.top  = e.clientY+'px';
});

document.querySelectorAll('.ctx-item').forEach(item => {
  item.addEventListener('click', () => {
    if (!ctxTargetId) return;
    setStatus(ctxTargetId, item.dataset.s);
    applyStatus();
    if (selectedId===ctxTargetId) selectNode(ctxTargetId);
    hideCtxMenu();
  });
});

window.addEventListener('click', hideCtxMenu);
function hideCtxMenu() { ctxMenu.style.display='none'; ctxTargetId=null; }

// ═══════════════════════════════════════════════════════
// 搜索
// ═══════════════════════════════════════════════════════
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  if (!q) { nodeSel.classed('dimmed', false); return; }
  nodeSel.classed('dimmed', d => !d.label.toLowerCase().includes(q) && !d.id.toLowerCase().includes(q));
});

document.getElementById('search').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const q = e.target.value.trim().toLowerCase();
  const found = nodes.find(n => n.label.toLowerCase().includes(q));
  if (found) {
    selectNode(found.id);
    const t = d3.zoomTransform(svg.node());
    svg.transition().duration(400).call(
      d3.zoom().transform,
      d3.zoomIdentity.translate(width()/2 - t.k*found.x, height()/2 - t.k*found.y).scale(t.k)
    );
  }
});

// ═══════════════════════════════════════════════════════
// 截图
// ═══════════════════════════════════════════════════════
document.getElementById('btn-screenshot').addEventListener('click', async () => {
  const btn = document.getElementById('btn-screenshot');
  btn.textContent = '生成中…';
  try {
    const dash = document.getElementById('dashboard');
    const canvas = await html2canvas(dash, { backgroundColor:'#121520', scale:2 });
    const a = document.createElement('a');
    a.download = `知识图谱进度_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.png`;
    a.href = canvas.toDataURL();
    a.click();
  } catch(err) { alert('截图失败：'+err.message); }
  btn.textContent = '📸 生成进度截图';
});

document.getElementById('dashboard').classList.add('panel-hidden');
</script>
</body>
