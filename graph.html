<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>知识图谱</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f5f2; color: #1a1a1a; font-family: -apple-system,'Inter','Segoe UI',sans-serif; overflow: hidden; }
#topbar {
  position: fixed; top: 0; left: 0; right: 0; height: 48px;
  background: rgba(250,250,247,.95); border-bottom: 1px solid #e0ddd6;
  display: flex; align-items: center; gap: 6px; padding: 0 16px;
  backdrop-filter: blur(8px); z-index: 30;
}
#topbar-title { font-size: 13px; font-weight: 600; color: #3d3d3a; margin-right: 8px; white-space: nowrap; }
.filter-btn {
  padding: 4px 12px; border: 1px solid transparent; border-radius: 20px;
  cursor: pointer; font-size: 11px; font-weight: 600; letter-spacing: .02em;
  transition: all .15s; color: #555; background: transparent;
}
.filter-btn:hover { background: #eeecea; border-color: #ccc; }
.filter-btn.active { border-color: transparent !important; color: #fff !important; }
.divider { width: 1px; height: 20px; background: #e0ddd6; margin: 0 4px; flex-shrink: 0; }
#search-wrap { margin-left: auto; position: relative; display: flex; align-items: center; }
#search-wrap svg { position: absolute; left: 9px; pointer-events: none; width: 13px; height: 13px; color: #999; }
#search-box {
  padding: 5px 10px 5px 30px; border: 1px solid #ddd; border-radius: 20px;
  background: #fff; color: #222; font-size: 12px; width: 180px; outline: none;
}
#search-box:focus { border-color: #7c5cbf; }
#home-btn {
  padding: 4px 12px; border: 1px solid #ddd; border-radius: 20px;
  cursor: pointer; font-size: 11px; color: #555; background: transparent;
  text-decoration: none; display: flex; align-items: center; gap: 4px;
}
#home-btn:hover { background: #eeecea; }
svg#graph { position: fixed; top: 48px; left: 0; width: 100vw; height: calc(100vh - 48px); }
.node circle { cursor: pointer; }
.node text { font-size: 10px; fill: #777; pointer-events: none; text-anchor: middle; }
.link { stroke: #d4d0c8; stroke-opacity: .8; }
.node.dimmed circle { opacity: .18; }
.node.dimmed text { opacity: .1; }
.link.dimmed { stroke-opacity: .06; }
.node.selected circle { stroke-width: 2.5px !important; filter: drop-shadow(0 0 6px rgba(0,0,0,.2)); }
.node.selected text { fill: #1a1a1a !important; font-weight: 600; }
.link.active { stroke-opacity: 1 !important; stroke-width: 2px !important; }
.node.has-note circle { stroke: #f59e0b !important; stroke-width: 2px !important; }

/* Detail Panel */
#detail {
  position: fixed; right: 0; top: 48px; width: 360px; height: calc(100vh - 48px);
  background: #fafaf7; border-left: 1px solid #e0ddd6;
  display: none; flex-direction: column; overflow: hidden;
  box-shadow: -4px 0 20px rgba(0,0,0,.06); z-index: 20;
}
#detail-header { padding: 16px 18px 12px; border-bottom: 1px solid #e8e5de; flex-shrink: 0; }
#detail-header-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
#d-title { font-size: 14px; font-weight: 700; color: #1a1a1a; flex: 1; margin-right: 8px; line-height: 1.3; }
#close-btn { cursor: pointer; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 4px; color: #999; font-size: 14px; }
#close-btn:hover { background: #eeecea; color: #333; }
.type-badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
#detail-tabs { display: flex; border-bottom: 1px solid #e8e5de; flex-shrink: 0; }
.tab-btn {
  flex: 1; padding: 10px; font-size: 12px; font-weight: 600; color: #888;
  border: none; background: transparent; cursor: pointer; border-bottom: 2px solid transparent;
  transition: color .15s;
}
.tab-btn.active { color: #7c5cbf; border-bottom-color: #7c5cbf; }
#detail-body { flex: 1; overflow-y: auto; padding: 14px 18px; }
#detail-body::-webkit-scrollbar { width: 4px; }
#detail-body::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
.section-label {
  font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  color: #b0aaa0; margin: 14px 0 8px; display: flex; align-items: center; gap: 6px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: #e8e5de; }
#d-desc { font-size: 12.5px; color: #555; line-height: 1.65; padding: 10px 12px; background: #f0ede6; border-radius: 6px; border-left: 3px solid #ccc; }
.conn-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; cursor: pointer; margin: 2px 0; transition: background .1s; }
.conn-item:hover { background: #f0ede6; }
.conn-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.conn-name { font-size: 12px; color: #333; flex: 1; }
.conn-type { font-size: 10px; color: #b0aaa0; }

/* Note tab */
#note-area {
  width: 100%; min-height: 160px; padding: 10px 12px;
  border: 1px solid #ddd; border-radius: 6px; font-size: 12.5px;
  font-family: inherit; line-height: 1.6; resize: vertical; outline: none;
  background: #fff; color: #1a1a1a;
}
#note-area:focus { border-color: #7c5cbf; }
#note-save {
  margin-top: 8px; padding: 6px 18px; background: #7c5cbf; color: #fff;
  border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600;
}
#note-save:hover { background: #6a4aaa; }
#note-saved { font-size: 11px; color: #4caf50; margin-left: 8px; opacity: 0; transition: opacity .3s; }

/* Quiz tab */
#quiz-start-btn {
  width: 100%; padding: 10px; background: #0a6ed1; color: #fff;
  border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
  margin-top: 8px;
}
#quiz-start-btn:hover { background: #0856a8; }
.quiz-history-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 10px; border-radius: 6px; background: #f0ede6; margin: 4px 0;
  font-size: 12px;
}
.quiz-score { font-weight: 700; }
.quiz-score.good { color: #2e7d32; }
.quiz-score.ok   { color: #f59e0b; }
.quiz-score.bad  { color: #c62828; }

/* Quiz Modal */
#quiz-modal {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
  z-index: 200; align-items: center; justify-content: center;
}
#quiz-modal.open { display: flex; }
#quiz-box {
  background: #fff; border-radius: 12px; width: min(520px, 94vw);
  max-height: 88vh; overflow-y: auto; padding: 28px;
  box-shadow: 0 12px 40px rgba(0,0,0,.22);
}
#quiz-box h2 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
#quiz-box .quiz-meta { font-size: 11px; color: #888; margin-bottom: 20px; }
.q-block { margin-bottom: 22px; }
.q-text { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 10px; line-height: 1.5; }
.q-options { display: flex; flex-direction: column; gap: 7px; }
.q-opt {
  padding: 9px 14px; border: 1.5px solid #e0ddd6; border-radius: 8px;
  cursor: pointer; font-size: 12.5px; color: #333; transition: all .12s;
}
.q-opt:hover { border-color: #7c5cbf; background: rgba(124,92,191,.06); }
.q-opt.selected { border-color: #7c5cbf; background: rgba(124,92,191,.1); color: #1a1a1a; }
.q-opt.correct  { border-color: #4caf50 !important; background: #e8f5e9 !important; color: #1a1a1a; }
.q-opt.wrong    { border-color: #e53935 !important; background: #ffebee !important; color: #1a1a1a; }
.q-explain { font-size: 11.5px; color: #555; margin-top: 8px; padding: 8px 10px; background: #f5f5f0; border-radius: 6px; line-height: 1.5; }
#quiz-footer { display: flex; gap: 10px; margin-top: 8px; align-items: center; }
#quiz-submit {
  padding: 9px 24px; background: #0a6ed1; color: #fff;
  border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
}
#quiz-submit:hover { background: #0856a8; }
#quiz-submit:disabled { background: #ccc; cursor: default; }
#quiz-close-btn {
  padding: 9px 18px; background: transparent; color: #888;
  border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 13px;
}
#quiz-result { font-size: 13px; font-weight: 700; color: #1a1a1a; }

/* Legend */
#legend {
  position: fixed; bottom: 16px; left: 16px; z-index: 20;
  background: rgba(250,250,247,.92); border: 1px solid #e0ddd6; border-radius: 8px;
  padding: 10px 14px; font-size: 11px; line-height: 2;
  box-shadow: 0 2px 12px rgba(0,0,0,.07);
}
#legend .row { display: flex; align-items: center; gap: 7px; color: #666; }
#legend .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
#stats { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #bbb; pointer-events: none; z-index: 5; background: rgba(250,250,247,.8); padding: 3px 10px; border-radius: 10px; }
#hover-tooltip { position: fixed; pointer-events: none; background: rgba(250,250,247,.95); border: 1px solid #e0ddd6; border-radius: 6px; padding: 6px 10px; font-size: 11px; color: #333; box-shadow: 0 2px 12px rgba(0,0,0,.1); max-width: 220px; display: none; z-index: 50; line-height: 1.4; }
</style>
</head>
<body>

<div id="topbar">
  <a id="home-btn" href="index.html">← 首页</a>
  <span id="topbar-title">基础课知识图谱</span>
  <div class="divider"></div>
  <button class="filter-btn active" id="btn-all" onclick="filterType('all')" style="background:#6b6b6b;color:#fff">All</button>
  <button class="filter-btn" id="btn-synthesis" onclick="filterType('synthesis')">总纲</button>
  <button class="filter-btn" id="btn-subject" onclick="filterType('subject')">学科</button>
  <button class="filter-btn" id="btn-concept" onclick="filterType('concept')">知识点</button>
  <button class="filter-btn" id="btn-source" onclick="filterType('source')">资料</button>
  <div class="divider"></div>
  <button class="filter-btn" onclick="clearAll()" style="color:#888">Reset</button>
  <div id="search-wrap">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8.5" cy="8.5" r="5.5"/><path d="M14 14l3.5 3.5"/></svg>
    <input id="search-box" placeholder="Search…" oninput="searchNodes(this.value)" />
  </div>
</div>

<svg id="graph">
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#c8c4bc"/>
    </marker>
  </defs>
</svg>

<div id="hover-tooltip"></div>

<div id="legend">
  <div class="row"><div class="dot" style="background:#E91E63"></div>总纲</div>
  <div class="row"><div class="dot" style="background:#7B68EE"></div>学科</div>
  <div class="row"><div class="dot" style="background:#29b6f6"></div>知识点</div>
  <div class="row"><div class="dot" style="background:#4caf50"></div>资料</div>
  <div class="row"><div class="dot" style="background:#f59e0b"></div>有笔记</div>
</div>
<div id="stats"></div>

<div id="detail">
  <div id="detail-header">
    <div id="detail-header-top">
      <div id="d-title"></div>
      <div id="close-btn" onclick="closeDetail()">✕</div>
    </div>
    <span id="d-badge" class="type-badge"></span>
  </div>
  <div id="detail-tabs">
    <button class="tab-btn active" onclick="switchTab('info')">📋 信息</button>
    <button class="tab-btn" onclick="switchTab('note')">📝 笔记</button>
    <button class="tab-btn" onclick="switchTab('quiz')">🎯 考试</button>
  </div>
  <div id="detail-body"></div>
</div>

<div id="quiz-modal">
  <div id="quiz-box">
    <h2 id="quiz-title"></h2>
    <div class="quiz-meta" id="quiz-meta"></div>
    <div id="quiz-questions"></div>
    <div id="quiz-footer">
      <button id="quiz-submit" onclick="submitQuiz()">提交答案</button>
      <button id="quiz-close-btn" onclick="closeQuiz()">关闭</button>
      <span id="quiz-result"></span>
    </div>
  </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const rawNodes = [
  { id:"synthesis-basics", type:"synthesis", label:"基础课", desc:"基础课总纲——涵盖人工智能基础、计算机视觉、机器学习中的优化方法、深度学习与强化学习四大板块。" },
  { id:"subject-ai-basics", type:"subject", label:"人工智能基础", desc:"搜索算法、知识表示、逻辑推理、概率模型（贝叶斯网络）、不确定性推理及 AI 伦理。" },
  { id:"subject-cv", type:"subject", label:"计算机视觉", desc:"图像处理、特征提取、目标检测、图像分割、3D 视觉与深度估计。" },
  { id:"subject-optim", type:"subject", label:"机器学习中的优化方法", desc:"梯度下降族、二阶方法、凸优化基础、约束优化、超参数调优。" },
  { id:"subject-dl-rl", type:"subject", label:"深度学习和强化学习", desc:"CNN/RNN/Transformer/生成模型与强化学习（MDP/Q-learning/策略梯度/PPO）。" },
  { id:"concept-search", type:"concept", label:"搜索算法", desc:"无信息搜索（BFS/DFS/迭代加深）与启发式搜索（A*/贪婪）——状态空间、路径代价、启发函数可容性。" },
  { id:"concept-bayes", type:"concept", label:"贝叶斯网络", desc:"概率图模型——条件独立性、联合概率因式分解、变量消元、置信传播、朴素贝叶斯分类器。" },
  { id:"concept-knowledge-repr", type:"concept", label:"知识表示与推理", desc:"一阶逻辑（FOL）、Horn 子句、归结原理、产生式规则、本体（Ontology）、知识图谱基础。" },
  { id:"concept-ml-basics", type:"concept", label:"机器学习基础", desc:"监督/无监督/半监督学习、偏差-方差权衡、交叉验证、正则化（L1/L2）、SVM、决策树与集成学习。" },
  { id:"concept-image-proc", type:"concept", label:"图像处理基础", desc:"卷积滤波（高斯/拉普拉斯/Sobel）、频域分析（FFT）、形态学操作、直方图均衡化、色彩空间。" },
  { id:"concept-feature-extract", type:"concept", label:"特征提取", desc:"手工特征：SIFT、HOG、ORB；深度特征：CNN 中间层激活、FPN；特征匹配与单应性矩阵。" },
  { id:"concept-detection", type:"concept", label:"目标检测", desc:"两阶段检测（Faster R-CNN）、单阶段检测（YOLO/SSD/FCOS）、NMS、mAP 评估指标、锚框机制。" },
  { id:"concept-segmentation", type:"concept", label:"图像分割", desc:"语义分割（FCN/DeepLab/SegFormer）、实例分割（Mask R-CNN）、全景分割；评估指标 mIoU。" },
  { id:"concept-gd", type:"concept", label:"梯度下降族", desc:"批量/随机/小批量 GD；动量法；AdaGrad/RMSProp/Adam/AdamW；学习率调度；梯度裁剪。" },
  { id:"concept-convex", type:"concept", label:"凸优化基础", desc:"凸集与凸函数、一阶/二阶条件、次梯度法、投影梯度法、对偶理论（拉格朗日/KKT 条件）。" },
  { id:"concept-second-order", type:"concept", label:"二阶优化方法", desc:"牛顿法（Hessian 逆）、拟牛顿法（L-BFGS/BFGS）、共轭梯度法；在深度学习中的应用与局限。" },
  { id:"concept-regularization", type:"concept", label:"正则化与泛化", desc:"L1/L2 正则化、Dropout、Batch Normalization、Early Stopping、数据增强；PAC 学习、VC 维。" },
  { id:"concept-cnn", type:"concept", label:"卷积神经网络", desc:"卷积层/池化层/全连接层、感受野、经典架构（AlexNet/VGG/ResNet/EfficientNet）、深度可分离卷积。" },
  { id:"concept-transformer", type:"concept", label:"Transformer & Attention", desc:"Self-Attention（Q/K/V）、Multi-Head Attention、位置编码、BERT/GPT 架构、Vision Transformer（ViT）。" },
  { id:"concept-generative", type:"concept", label:"生成模型", desc:"VAE（ELBO 推导）、GAN（对抗训练、模式崩溃）、扩散模型（DDPM/Score Matching）。" },
  { id:"concept-rl", type:"concept", label:"强化学习基础", desc:"MDP（状态/动作/奖励/转移）、Bellman 方程、Q-learning、SARSA、DQN；探索与利用权衡。" },
  { id:"concept-policy-grad", type:"concept", label:"策略梯度方法", desc:"REINFORCE、Actor-Critic（A2C/A3C）、PPO（Clipped Objective）、TRPO、SAC（最大熵 RL）。" },
  { id:"source-russel-norvig", type:"source", label:"AIMA", desc:"《Artificial Intelligence: A Modern Approach》第4版——AI 基础权威教材。", url:"https://aima.cs.berkeley.edu/" },
  { id:"source-cs231n", type:"source", label:"CS231n", desc:"Stanford CS231n: Deep Learning for Computer Vision——课程笔记与作业。", url:"https://cs231n.stanford.edu/" },
  { id:"source-goodfellow", type:"source", label:"Deep Learning Book", desc:"Goodfellow et al.《Deep Learning》——深度学习圣经。", url:"https://www.deeplearningbook.org/" },
  { id:"source-sutton-barto", type:"source", label:"Sutton & Barto", desc:"《Reinforcement Learning: An Introduction》第2版——强化学习权威教材。", url:"http://incompleteideas.net/book/the-book-2nd.html" },
  { id:"source-boyd-convex", type:"source", label:"Boyd Convex Opt", desc:"凸优化经典——对偶理论、KKT 条件、内点法。", url:"https://web.stanford.edu/~boyd/cvxbook/" },
  { id:"source-d2l", type:"source", label:"动手学深度学习", desc:"李沐等《动手学深度学习》——PyTorch 代码实战，免费在线。", url:"https://zh.d2l.ai/" },
  { id:"source-spinning-up", type:"source", label:"OpenAI Spinning Up", desc:"OpenAI Spinning Up in Deep RL——PPO/SAC/TD3 实现，附代码框架。", url:"https://spinningup.openai.com/" }
];

const rawEdges = [
  {source:"synthesis-basics",target:"subject-ai-basics"},
  {source:"synthesis-basics",target:"subject-cv"},
  {source:"synthesis-basics",target:"subject-optim"},
  {source:"synthesis-basics",target:"subject-dl-rl"},
  {source:"subject-ai-basics",target:"concept-search"},
  {source:"subject-ai-basics",target:"concept-bayes"},

  {source:"subject-optim",target:"concept-convex"},

  {source:"subject-dl-rl",target:"source-spinning-up"},
  {source:"concept-ml-basics",target:"concept-gd"},
  {source:"concept-ml-basics",target:"concept-regularization"},
  {source:"concept-cnn",target:"concept-image-proc"},
  {source:"concept-cnn",target:"concept-feature-extract"},
  {source:"concept-cnn",target:"concept-detection"},
  {source:"concept-cnn",target:"concept-segmentation"},
  {source:"concept-transformer",target:"concept-detection"},
  {source:"concept-transformer",target:"concept-segmentation"},
  {source:"concept-gd",target:"concept-cnn"},
  {source:"concept-gd",target:"concept-transformer"},
  {source:"concept-regularization",target:"concept-cnn"},
  {source:"concept-bayes",target:"concept-rl"},

  {source:"concept-generative",target:"concept-transformer"},
  {source:"concept-second-order",target:"concept-convex"},
  {source:"concept-feature-extract",target:"concept-detection"},
  {source:"source-cs231n",target:"concept-cnn"},
  {source:"source-cs231n",target:"concept-detection"},
  {source:"source-goodfellow",target:"concept-gd"},

  {source:"source-sutton-barto",target:"concept-rl"},
  {source:"source-sutton-barto",target:"concept-policy-grad"},

  {source:"source-d2l",target:"concept-cnn"},
  {source:"source-d2l",target:"concept-transformer"},

  {source:"source-russel-norvig",target:"concept-bayes"}

    { q:"扩散模型（Diffusion Model）的核心思想是？", opts:["通过对抗训练生成图像","逐步向数据加噪（正向过程），再学习逐步去噪（逆向过程）","直接从随机噪声映射到图像","通过变分推断学习潜在空间"], ans:1, explain:"扩散模型定义正向过程逐步将数据变为高斯噪声，然后训练神经网络学习逆向去噪过程，推理时从纯噪声逐步采样。" },
    { q:"Flow-based 模型的特点是？", opts:["需要判别器","使用可逆变换，可以精确计算数据的对数似然","训练不稳定","只适合低维数据"], ans:1, explain:"Flow-based 模型使用一系列可逆变换将简单分布映射到数据分布，利用变量替换公式精确计算似然。" }
  ],
  "concept-rl": [
    { q:"MDP 的马尔可夫性质是指？", opts:["奖励只与当前状态有关","下一状态只依赖当前状态和动作，与历史无关","智能体的策略是确定性的","环境是完全可观测的"], ans:1, explain:"马尔可夫性质：下一状态只由当前状态和动作决定，与历史无关。" },
    { q:"Bellman 方程描述的是？", opts:["最优策略的直接求解公式","状态值函数的递归关系（当前值=即时奖励+折扣未来值）","Q 值的更新规则","策略梯度定理"], ans:1, explain:"Bellman 方程：V(s) = E[r + γV(s')]，将当前状态的价值分解为即时奖励和折扣后的下一状态价值。" },
    { q:"Q-learning 是一种？", opts:["基于模型的方法","无模型、基于值函数的离策略（off-policy）方法","策略梯度方法","进化算法"], ans:1, explain:"Q-learning 是无模型的 TD 学习方法，直接学习最优动作价值函数 Q*，属于离策略方法。" },
    { q:"ε-greedy 探索策略中 ε 的作用是？", opts:["控制学习率","以 ε 的概率随机探索，以 1-ε 的概率利用当前最优动作","控制折扣因子","确定奖励范围"], ans:1, explain:"ε-greedy 通过参数 ε 平衡探索（随机动作）和利用（最优动作），训练初期通常使用较大 ε，随训练逐渐减小。" }

    { q:"PPO 引入裁剪目标的原因是？", opts:["加速计算","限制每次策略更新的幅度，避免更新过大导致性能崩溃","增加探索","处理连续动作空间"], ans:1, explain:"PPO 的裁剪目标通过限制新旧策略的概率比在 [1-ε, 1+ε] 范围内，防止策略更新步长过大导致的训练不稳定。" },
    { q:"Actor-Critic 方法中 Actor 和 Critic 的作用分别是？", opts:["Actor 评估状态价值，Critic 生成动作","Actor 生成动作（策略），Critic 评估状态价值（值函数）","Actor 处理离散动作，Critic 处理连续动作","两者功能相同，只是网络不同"], ans:1, explain:"Actor 是策略网络，输出动作概率；Critic 是值函数网络，评估当前状态的价值，为 Actor 的更新提供基线。" },
    { q:'SAC（Soft Actor-Critic）的"Soft"体现在？', opts:["使用软标签","在奖励中加入策略熵项，鼓励探索（最大熵强化学习框架）","软更新目标网络","使用软激活函数"], ans:1, explain:"SAC 在优化目标中加入策略熵的正则项，使智能体在最大化累积奖励的同时保持策略的随机性（多样化探索）。" }
  ]
};

const STORAGE_KEY = 'course_kg_data';
function loadData() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; } }
function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

const TYPE_COLOR = { synthesis:'#E91E63', subject:'#7B68EE', concept:'#29b6f6', source:'#4caf50' };
const TYPE_R     = { synthesis:20, subject:16, concept:10, source:8 };
const TYPE_LABEL = { synthesis:'总纲', subject:'学科', concept:'知识点', source:'资料' };
const BADGE_BG   = { synthesis:'#fce4ec', subject:'#ede7f6', concept:'#e1f5fe', source:'#e8f5e9' };
const BADGE_CLR  = { synthesis:'#c2185b', subject:'#512da8', concept:'#0277bd', source:'#2e7d32' };

const nodes    = rawNodes.map(d => ({...d}));
const edges    = rawEdges.map(d => ({...d}));
const nodeById = Object.fromEntries(nodes.map(n => [n.id, n]));

let selectedNode = null;
let currentTab   = 'info';
let activeFilter = 'all';

const svg = d3.select('svg#graph');
const W = () => window.innerWidth;
const H = () => window.innerHeight - 48;
const g = svg.append('g');
svg.call(d3.zoom().scaleExtent([.2,4]).on('zoom', e => g.attr('transform', e.transform)));

const sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(edges).id(d=>d.id).distance(d => {
    const st=d.source.type||'', tt=d.target.type||'';
    if(st==='synthesis'||tt==='synthesis') return 160;
    if(st==='subject'||tt==='subject') return 120;
    return 90;
  }).strength(.6))
  .force('charge', d3.forceManyBody().strength(d=>d.type==='synthesis'?-800:d.type==='subject'?-400:-180))
  .force('center', d3.forceCenter(W()/2, H()/2))
  .force('collision', d3.forceCollide().radius(d=>TYPE_R[d.type]+18));

const link = g.append('g').selectAll('line').data(edges).join('line')
  .attr('class','link').attr('stroke-width',1.2).attr('marker-end','url(#arrow)');

const node = g.append('g').selectAll('g.node').data(nodes).join('g')
  .attr('class','node')
  .call(d3.drag()
    .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;})
    .on('drag', (e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on('end',  (e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));

node.append('circle')
  .attr('r', d=>TYPE_R[d.type])
  .attr('fill', d=>TYPE_COLOR[d.type])
  .attr('stroke','#fff').attr('stroke-width',1.5);

node.append('text').attr('dy', d=>TYPE_R[d.type]+13).text(d=>d.label);

sim.on('tick', () => {
  link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
      .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  node.attr('transform',d=>`translate(${d.x},${d.y})`);
});

function refreshNoteMarkers() {
  const data = loadData();
  node.classed('has-note', d => !!(data[d.id]?.note?.trim()));
  node.select('circle')
    .attr('stroke', d => (data[d.id]?.note?.trim()) ? '#f59e0b' : '#fff')
    .attr('stroke-width', d => (data[d.id]?.note?.trim()) ? 2 : 1.5);
}
refreshNoteMarkers();

const tooltip = document.getElementById('hover-tooltip');
node.on('mouseover',(e,d)=>{
  tooltip.style.display='block';
  tooltip.innerHTML=`<strong>${d.label}</strong><br><span style="color:#888;font-size:10px">${TYPE_LABEL[d.type]}</span>`;
  d3.selectAll('.node').classed('dimmed',n=>n.id!==d.id)
    .classed('hovered',n=>n.id===d.id)
    .classed('hover-neighbor',n=>edges.some(e=>(e.source.id===d.id&&e.target.id===n.id)||(e.target.id===d.id&&e.source.id===n.id)));
  d3.selectAll('.link').classed('dimmed',e=>e.source.id!==d.id&&e.target.id!==d.id);
}).on('mousemove',e=>{
  tooltip.style.left=(e.clientX+14)+'px'; tooltip.style.top=(e.clientY-10)+'px';
}).on('mouseout',()=>{
  tooltip.style.display='none';
  if(!selectedNode){d3.selectAll('.node').classed('dimmed hovered hover-neighbor',false);d3.selectAll('.link').classed('dimmed',false);}
});

node.on('click',(e,d)=>{
  e.stopPropagation();
  if(selectedNode===d.id){closeDetail();return;}
  selectedNode=d.id;
  const neighbors=new Set(edges.flatMap(e=>e.source.id===d.id?[e.target.id]:e.target.id===d.id?[e.source.id]:[]));
  d3.selectAll('.node')
    .classed('selected',n=>n.id===d.id)
    .classed('neighbor',n=>neighbors.has(n.id))
    .classed('dimmed',n=>n.id!==d.id&&!neighbors.has(n.id))
    .classed('hovered hover-neighbor',false);
  d3.selectAll('.link')
    .classed('active',e=>e.source.id===d.id||e.target.id===d.id)
    .classed('dimmed',e=>e.source.id!==d.id&&e.target.id!==d.id);
  currentTab='info';
  showDetail(d, neighbors);
});
svg.on('click',()=>closeDetail());

function showDetail(d, neighbors) {
  document.getElementById('d-title').textContent=d.label;
  const badge=document.getElementById('d-badge');
  badge.textContent=TYPE_LABEL[d.type];
  badge.style.background=BADGE_BG[d.type]; badge.style.color=BADGE_CLR[d.type];
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['info','note','quiz'][i]===currentTab));
  renderTab(d, neighbors);
  document.getElementById('detail').style.display='flex';
}

function switchTab(tab) {
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['info','note','quiz'][i]===tab));
  const d=nodeById[selectedNode];
  const neighbors=new Set(edges.flatMap(e=>e.source.id===d.id?[e.target.id]:e.target.id===d.id?[e.source.id]:[]));
  renderTab(d, neighbors);
}

function renderTab(d, neighbors) {
  const body=document.getElementById('detail-body');
  if(currentTab==='info') {
    let html=`<div class="section-label">描述</div><div id="d-desc">${d.desc||'暂无描述'}</div>`;
    if(d.url) html+=`<div class="section-label">链接</div><a href="${d.url}" target="_blank" style="display:flex;align-items:center;gap:8px;font-size:12px;color:#6e54b5;text-decoration:none;padding:7px 10px;border-radius:6px;background:rgba(110,84,181,.06);border:1px solid rgba(110,84,181,.15);">🔗 ${d.url}</a>`;
    html+=`<div class="section-label">关联节点 <span style="color:#aaa;font-weight:400">(${neighbors.size})</span></div><div id="d-connections"></div>`;
    body.innerHTML=html;
    const connEl=document.getElementById('d-connections');
    [...neighbors].map(id=>nodeById[id]).filter(Boolean).forEach(n=>{
      const item=document.createElement('div');
      item.className='conn-item';
      item.innerHTML=`<div class="conn-dot" style="background:${TYPE_COLOR[n.type]}"></div><span class="conn-name">${n.label}</span><span class="conn-type">${TYPE_LABEL[n.type]}</span>`;
      item.onclick=()=>node.filter(x=>x.id===n.id).dispatch('click');
      connEl.appendChild(item);
    });
  } else if(currentTab==='note') {
    const data=loadData();
    const note=data[d.id]?.note||'';
    body.innerHTML=`
      <div class="section-label" style="margin-top:4px">我的笔记</div>
      <textarea id="note-area" placeholder="在这里写下你的学习笔记…">${note}</textarea>
      <div style="display:flex;align-items:center;margin-top:8px">
        <button id="note-save" onclick="saveNote('${d.id}')">保存笔记</button>
        <span id="note-saved">已保存 ✓</span>
      </div>`;
  } else if(currentTab==='quiz') {
    const data=loadData();
    const history=(data[d.id]?.quizHistory||[]).slice().reverse();
    const hasQuiz=!!(QUIZ_DATA[d.id]&&QUIZ_DATA[d.id].length>0);
    let html=`<div class="section-label" style="margin-top:4px">考试测验</div>`;
    if(hasQuiz) html+=`<button id="quiz-start-btn" onclick="startQuiz('${d.id}')">🎯 开始考试（${QUIZ_DATA[d.id].length} 题）</button>`;
    else html+=`<div style="font-size:12px;color:#aaa;padding:12px 0">该节点暂无题目</div>`;
    html+=`<div class="section-label" style="margin-top:16px">考试记录</div>`;
    if(history.length===0) html+=`<div style="font-size:12px;color:#aaa">暂无考试记录</div>`;
    else history.forEach(h=>{
      const pct=Math.round(h.score/h.total*100);
      const cls=pct>=80?'good':pct>=60?'ok':'bad';
      html+=`<div class="quiz-history-item"><span>${h.date}</span><span class="quiz-score ${cls}">${h.score}/${h.total}（${pct}%）</span></div>`;
    });
    body.innerHTML=html;
  }
}

function saveNote(nodeId) {
  const note=document.getElementById('note-area').value;
  const data=loadData();
  if(!data[nodeId]) data[nodeId]={};
  data[nodeId].note=note;
  saveData(data);
  const saved=document.getElementById('note-saved');
  saved.style.opacity=1;
  setTimeout(()=>saved.style.opacity=0, 1500);
  refreshNoteMarkers();
}

function closeDetail() {
  selectedNode=null;
  document.getElementById('detail').style.display='none';
  d3.selectAll('.node').classed('selected neighbor dimmed hovered hover-neighbor',false);
  d3.selectAll('.link').classed('active dimmed',false);
}

let currentQuizNodeId=null, userAnswers=[], quizSubmitted=false;

function startQuiz(nodeId) {
  currentQuizNodeId=nodeId; userAnswers=[]; quizSubmitted=false;
  const d=nodeById[nodeId], qs=QUIZ_DATA[nodeId]||[];
  document.getElementById('quiz-title').textContent=`${d.label} — 测验`;
  document.getElementById('quiz-meta').textContent=`共 ${qs.length} 道单选题`;
  document.getElementById('quiz-result').textContent='';
  document.getElementById('quiz-submit').disabled=false;
  document.getElementById('quiz-submit').textContent='提交答案';
  const qEl=document.getElementById('quiz-questions');
  qEl.innerHTML='';
  qs.forEach((q,qi)=>{
    userAnswers.push(null);
    const block=document.createElement('div');
    block.className='q-block';
    block.innerHTML=`<div class="q-text">${qi+1}. ${q.q}</div><div class="q-options" id="opts-${qi}"></div><div class="q-explain" id="explain-${qi}" style="display:none">${q.explain}</div>`;
    qEl.appendChild(block);
    const optsEl=document.getElementById(`opts-${qi}`);
    q.opts.forEach((opt,oi)=>{
      const btn=document.createElement('div');
      btn.className='q-opt'; btn.textContent=`${['A','B','C','D'][oi]}. ${opt}`;
      btn.onclick=()=>selectOpt(qi,oi);
      optsEl.appendChild(btn);
    });
  });
  document.getElementById('quiz-modal').classList.add('open');
}

function selectOpt(qi,oi) {
  if(quizSubmitted) return;
  userAnswers[qi]=oi;
  document.getElementById(`opts-${qi}`).querySelectorAll('.q-opt').forEach((b,i)=>b.classList.toggle('selected',i===oi));
}

function submitQuiz() {
  if(quizSubmitted){closeQuiz();return;}
  const qs=QUIZ_DATA[currentQuizNodeId]||[];
  let score=0;
  qs.forEach((q,qi)=>{
    document.getElementById(`opts-${qi}`).querySelectorAll('.q-opt').forEach((b,oi)=>{
      b.classList.remove('selected');
      if(oi===q.ans) b.classList.add('correct');
      else if(oi===userAnswers[qi]&&userAnswers[qi]!==q.ans) b.classList.add('wrong');
    });
    if(userAnswers[qi]===q.ans) score++;
    document.getElementById(`explain-${qi}`).style.display='block';
  });
  quizSubmitted=true;
  const pct=Math.round(score/qs.length*100);
  document.getElementById('quiz-result').textContent=`得分：${score}/${qs.length}（${pct}%）`;
  document.getElementById('quiz-submit').textContent='关闭';
  const data=loadData();
  if(!data[currentQuizNodeId]) data[currentQuizNodeId]={};
  if(!data[currentQuizNodeId].quizHistory) data[currentQuizNodeId].quizHistory=[];
  data[currentQuizNodeId].quizHistory.push({ date:new Date().toLocaleDateString('zh-CN'), score, total:qs.length });
  saveData(data);
  const d=nodeById[currentQuizNodeId];
  const neighbors=new Set(edges.flatMap(e=>e.source.id===d.id?[e.target.id]:e.target.id===d.id?[e.source.id]:[]));
  if(currentTab==='quiz') renderTab(d, neighbors);
}

function closeQuiz() { document.getElementById('quiz-modal').classList.remove('open'); }

function filterType(type) {
  activeFilter=type;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  const idMap={all:'btn-all',synthesis:'btn-synthesis',subject:'btn-subject',concept:'btn-concept',source:'btn-source'};
  const btn=document.getElementById(idMap[type]);
  if(btn){btn.classList.add('active');btn.style.background=type==='all'?'#6b6b6b':TYPE_COLOR[type]||'#6b6b6b';btn.style.color='#fff';}
  if(type==='all'){node.style('display',null);link.style('display',null);}
  else{
    const vis=new Set(nodes.filter(n=>n.type===type).map(n=>n.id));
    node.style('display',d=>vis.has(d.id)?null:'none');
    link.style('display',e=>vis.has(e.source.id)&&vis.has(e.target.id)?null:'none');
  }
}
function clearAll(){filterType('all');closeDetail();}
function searchNodes(q){
  if(!q){node.classed('dimmed',false);link.classed('dimmed',false);return;}
  const lq=q.toLowerCase();
  const matched=new Set(nodes.filter(n=>n.label.toLowerCase().includes(lq)||(n.desc||'').toLowerCase().includes(lq)).map(n=>n.id));
  node.classed('dimmed',d=>!matched.has(d.id));
  link.classed('dimmed',e=>!matched.has(e.source.id)&&!matched.has(e.target.id));
}

document.getElementById('stats').textContent=`${nodes.length} 节点 · ${edges.length} 连接`;
window.addEventListener('resize',()=>sim.force('center',d3.forceCenter(W()/2,H()/2)).alpha(.1).restart());
</script>
</body>
</html>
